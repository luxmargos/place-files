# Realistic testbed config
# Source files live in source/.
# Target files are written into workdir/, which is generated by npm run testbed:reset.

base_dir: .

version_file: source/place-files.version
applied_version_file: workdir/.place-files.applied.version

entries:
  # Single file placement. Existing target file should be backed up.
  - src: source/files/project-notes.md
    dst: workdir/docs/project-notes.md

  # Glob placement preserves source/config under workdir/config.
  # Existing app.json should be backed up; logging.json should be added.
  - src: source/config/*.json
    dst: workdir/config

  # Directory placement. Existing assets directory should be backed up as a directory.
  - src: source/assets
    dst: workdir/assets

backup:
  enabled: true
  directory: workdir/.place-files-backups
  include_previous_version: true

behavior:
  place_when_version_missing: true
  fail_on_missing_source: true
  preserve_glob_paths: true
